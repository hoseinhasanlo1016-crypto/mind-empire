<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ما ار گنگ | The Mind Empire</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #f0ede6;
    --muted: #6b6875;
    --border: #1e1e2a;
  }

  body.light-mode {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --gold: #a07830;
    --gold-light: #c9960a;
    --white: #1a1a2e;
    --muted: #888;
    --border: #ddd;
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.4s, color 0.4s;
  }

  /* Floating words canvas */
  #floatingCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .float-word {
    position: absolute;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    color: var(--gold);
    opacity: 0.08;
    white-space: nowrap;
    animation: floatAround linear infinite;
    pointer-events: none;
    user-select: none;
  }

  body.light-mode .float-word {
    opacity: 0.1;
  }

  @keyframes floatAround {
    0%   { transform: translateY(0px) rotate(var(--rot)); opacity: 0; }
    10%  { opacity: var(--max-opacity); }
    90%  { opacity: var(--max-opacity); }
    100% { transform: translateY(var(--travel)) rotate(var(--rot)); opacity: 0; }
  }

  /* Dark/Light toggle */
  .mode-btn {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--gold);
    font-size: 1.3rem;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s, border 0.3s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .mode-btn:hover { transform: scale(1.1); }

  header {
    width: 100%;
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
    z-index: 1;
  }

  .crown {
    font-size: 2.5rem;
    margin-bottom: 12px;
    display: block;
  }

  .site-title-fa {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    line-height: 1.2;
  }

  .site-title-en {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    color: var(--muted);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 400;
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 24px auto;
  }

  .search-section {
    width: 100%;
    max-width: 560px;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  .search-label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    text-align: center;
  }

  .search-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-input {
    width: 100%;
    padding: 16px 56px 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--white);
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.3s, background 0.3s, color 0.3s;
    text-align: right;
  }

  .search-input::placeholder { color: var(--muted); }

  .search-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.2);
  }

  .search-btn {
    position: absolute;
    left: 12px;
    background: none;
    border: none;
    color: var(--gold);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 4px;
    transition: transform 0.2s;
  }
  .search-btn:hover { transform: scale(1.1); }

  .result-section {
    width: 100%;
    max-width: 660px;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 40px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.5s ease;
    transition: background 0.3s, border 0.3s;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--gold-light);
    margin-bottom: 6px;
  }

  .card-ornament {
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .card-text {
    color: var(--white);
    line-height: 2;
    font-size: 1rem;
    font-weight: 300;
    opacity: 0.85;
  }

  .not-found {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    animation: fadeIn 0.4s ease;
  }
  .not-found .nf-icon { font-size: 2rem; margin-bottom: 12px; }
  .not-found p { font-size: 0.95rem; line-height: 1.8; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    position: relative;
    z-index: 1;
  }
  .empty-state p { font-size: 0.9rem; letter-spacing: 1px; margin-top: 8px; }

  footer {
    margin-top: auto;
    padding: 30px;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .card-inner {
    display: flex;
    gap: 28px;
    align-items: flex-start;
  }
  .card-photo {
    width: 130px;
    min-width: 130px;
    height: 160px;
    object-fit: cover;
    border-radius: 6px;
    border: 2px solid var(--gold);
    box-shadow: 0 4px 20px rgba(201,168,76,0.2);
  }
  .card-content { flex: 1; }
  @media (max-width: 500px) {
    .card-inner { flex-direction: column; align-items: center; }
    .card-photo { width: 100%; height: 200px; }
  }

  /* 3D tilt card */
  .card {
    transform-style: preserve-3d;
    transform: perspective(800px) rotateX(0deg) rotateY(0deg);
    transition: box-shadow 0.2s;
    will-change: transform;
  }
  .card:hover {
    box-shadow: 0 20px 60px rgba(201,168,76,0.25);
  }

  /* Improved search box */
  .search-section {
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 16px;
    padding: 28px 28px 24px;
    box-shadow: 0 0 30px rgba(201,168,76,0.08);
    max-width: 560px;
  }
  .search-input {
    border-radius: 12px;
    padding: 18px 20px 18px 80px;
    font-size: 1.05rem;
    background: var(--bg);
    border: 1.5px solid var(--border);
  }
  .search-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
  }
  .search-btn {
    left: 14px;
    font-size: 1.4rem;
  }
  .search-label {
    font-size: 0.8rem;
    margin-bottom: 16px;
  }

  .back-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 100;
    background: var(--surface);
    border: 1.5px solid var(--gold);
    color: var(--gold);
    padding: 12px 20px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.15s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.2);
    display: none;
  }
  .back-btn:hover {
    background: var(--gold);
    color: #000;
  }
</style>
</head>
<body>

<div id="floatingCanvas"></div>

<button class="mode-btn" onclick="toggleMode()" id="modeBtn" title="تغییر حالت">🌙</button>

<header>
  <div class="site-title-fa">موتور جست و جوی دانش‌آموزان کلاس هفتم</div>
  <div class="site-title-en">The Mind Empire</div>
  <div class="divider"></div>
</header>

<section class="search-section">
  <label class="search-label" for="searchInput">جستجوی نام</label>
  <div class="search-wrapper">
    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="نام فرد خفن/احمق رو بنویسید گوگولیا😍😍(ماچ بده)"
      autocomplete="off"
    />
    <button class="search-btn" onclick="doSearch()" title="جستجو">🔍</button>
  </div>
</section>

<section class="result-section" id="resultSection">
  <div class="empty-state">
    <div style="font-size:2rem; margin-bottom:10px;">✦</div>
    <p>اسم فرد موردنظرتو بنویس ببین خفنه یا نه😯😯(پشماااااام)</p>
  </div>
</section>



<script>
  // ── Floating words ──
  const gangWords = [
    'گنگ','خفن','Top','👅',
    'گنگ','خفن','Top','👅',
    'گنگ','خفن','Top','👅'
  ];

  const canvas = document.getElementById('floatingCanvas');

  function createWord() {
    const el = document.createElement('span');
    el.className = 'float-word';
    el.textContent = gangWords[Math.floor(Math.random() * gangWords.length)];
    const size = 14 + Math.random() * 28;
    el.style.fontSize = size + 'px';
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.top = (100 + Math.random() * 20) + 'vh';
    const duration = 8 + Math.random() * 14;
    const travel = -(110 + Math.random() * 60);
    const rot = (Math.random() - 0.5) * 30;
    const maxOp = 0.06 + Math.random() * 0.1;
    el.style.setProperty('--travel', travel + 'vh');
    el.style.setProperty('--rot', rot + 'deg');
    el.style.setProperty('--max-opacity', maxOp);
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = (Math.random() * -duration) + 's';
    canvas.appendChild(el);
    setTimeout(() => el.remove(), (duration + 2) * 1000);
  }

  // Spawn words continuously
  for (let i = 0; i < 20; i++) setTimeout(createWord, i * 400);
  setInterval(createWord, 600);

  // ── Dark/Light mode ──
  let isLight = false;
  function toggleMode() {
    isLight = !isLight;
    document.body.classList.toggle('light-mode', isLight);
    document.getElementById('modeBtn').textContent = isLight ? '🌙' : '☀️';
  }

  const input = document.getElementById('searchInput');
  const resultSection = document.getElementById('resultSection');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  function doSearch() {
    const query = input.value.trim();
    if (!query) return;

    const matches = Object.keys(data).filter(name =>
      name === query || name.includes(query) || query.includes(name)
    );

    if (matches.length > 0) {
      const cards = matches.map(match => {
        const paragraphs = data[match].text
          .split('\n\n')
          .filter(p => p.trim())
          .map(p => `<p class="card-text" style="margin-bottom:16px">${p.trim()}</p>`)
          .join('');
        const imgTag = data[match].img ? `<img class="card-photo" src="${data[match].img}" alt="${match}">` : '';
        return `
        <div class="card" style="margin-bottom:24px">
          <div class="card-inner">
            ${imgTag}
            <div class="card-content">
              <div class="card-name">${match}</div>
              ${paragraphs}
            </div>
          </div>
        </div>`;
      }).join('');
      resultSection.innerHTML = cards;
      document.getElementById('backBtn').style.display = 'block';
    } else {
      resultSection.innerHTML = `
        <div class="not-found">
          <div class="nf-icon">✦</div>
          <p>«${query}» در ما ار گنگ یافت نشد.</p>
        </div>
      `;
    }
  }

  function goHome() {
    document.getElementById('searchInput').value = '';
    document.getElementById('backBtn').style.display = 'none';
    document.getElementById('resultSection').innerHTML = `
      <div class="empty-state">
        <div style="font-size:2rem; margin-bottom:10px;">✦</div>
        <p>اسم فرد موردنظرتو بنویس ببین خفنه یا نه😯😯(پشماااااام)</p>
      </div>
    `;
  }

  // 3D tilt effect
  document.addEventListener('mousemove', function(e) {
    // Tilt back button
    const btn = document.getElementById('backBtn');
    if (btn && btn.style.display !== 'none') {
      const br = btn.getBoundingClientRect();
      const bcx = br.left + br.width/2;
      const bcy = br.top + br.height/2;
      const bdx = e.clientX - bcx;
      const bdy = e.clientY - bcy;
      const bdist = Math.sqrt(bdx*bdx + bdy*bdy);
      if (bdist < 200) {
        const s = (1 - bdist/200) * 15;
        const rx = -(bdy/br.height)*s;
        const ry = (bdx/br.width)*s;
        btn.style.transform = `perspective(400px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.08)`;
      } else {
        btn.style.transform = 'perspective(400px) rotateX(0deg) rotateY(0deg) scale(1)';
      }
    }

    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
      const rect = card.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const maxDist = 400;
      if (dist < maxDist) {
        const strength = (1 - dist/maxDist) * 12;
        const rotX = -(dy / rect.height) * strength;
        const rotY = (dx / rect.width) * strength;
        card.style.transform = `perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.05)`;
      document.getElementById('backBtn').style.display = 'block';
    } else {
        card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
      }
    });
  });
</script>

<button class="back-btn" id="backBtn" onclick="goHome()">بزن روم تا برگردی به صفحه اصلی اممم🫦🫦</button>
